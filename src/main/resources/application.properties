# Profile
#spring.profiles.active=develop
# Local server (mock)
server.port=9920
server.servlet.context-path=/

# Logging
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
logging.level.org.apache=ERROR
logging.level.ru.checkdev=DEBUG
logging.file.name=logs/notification.log

# Security
spring.security.oauth2.resourceserver.opaquetoken.introspection-uri=http://localhost:9900/user
spring.security.oauth2.resourceserver.opaquetoken.client-id=placeholder
spring.security.oauth2.resourceserver.opaquetoken.client-secret=placeholder

# Datasource
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/cd_notification
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.change-log=classpath:db/db.changelog-master.xml
logging.level.liquibase=error

# Other
spring.main.banner-mode=off
access.key=96GcWB8a

# Eureka
spring.application.name=notification
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:9009/eureka
eureka.client.http-client.type=resttemplate

# Resilience4j
# ===== Retry =====
resilience4j.retry.instances.authService.maxAttempts=3
resilience4j.retry.instances.authService.waitDuration=500ms
resilience4j.retry.instances.authService.enableExponentialBackoff=true
resilience4j.retry.instances.authService.exponentialBackoffMultiplier=2
resilience4j.retry.instances.authService.retryExceptions[0]=org.springframework.web.reactive.function.client.WebClientRequestException
resilience4j.retry.instances.authService.retryExceptions[1]=java.util.concurrent.TimeoutException
resilience4j.retry.retryAspectOrder=2

# ===== Circuit Breaker =====
resilience4j.circuitbreaker.instances.authService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.authService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.authService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.authService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.authService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.authService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.authService.registerHealthIndicator=true
resilience4j.circuitbreaker.circuitBreakerAspectOrder=1

# ===== Actuator =====
management.endpoints.web.exposure.include=health,circuitbreakers,circuitbreakerevents
management.health.circuitbreakers.enabled=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*